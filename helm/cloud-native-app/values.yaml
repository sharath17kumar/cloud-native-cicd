replicaCount: 3

image:
  repository: sharath1706/cloud-native-app
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: cloudnative.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

monitoring:
  enabled: true
  path: /metrics
  port: 3000
